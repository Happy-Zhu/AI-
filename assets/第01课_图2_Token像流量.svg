<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#fbfbfd"/>
  <text x="600" y="66" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">Token 可以先理解成 AI 的“文字流量”</text>
  <text x="600" y="106" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">你发给 AI 的内容会消耗 Token，AI 回复你的内容也会消耗 Token</text>

  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="85" y="170" width="280" height="130" rx="24" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="225" y="220" text-anchor="middle" font-size="24" font-weight="700" fill="#344054">你的输入</text>
    <text x="225" y="255" text-anchor="middle" font-size="17" fill="#667085">问题、资料、背景信息</text>

    <path d="M375 235 H467" stroke="#f59e0b" stroke-width="5" fill="none" marker-end="url(#arrowOrange)"/>
    <text x="420" y="212" text-anchor="middle" font-size="16" fill="#92400e">消耗 Token</text>

    <rect x="480" y="145" width="240" height="180" rx="32" fill="#ecfdf3" stroke="#10b981" stroke-width="3"/>
    <text x="600" y="205" text-anchor="middle" font-size="28" font-weight="700" fill="#047857">AI 模型</text>
    <text x="600" y="245" text-anchor="middle" font-size="17" fill="#344054">读取输入</text>
    <text x="600" y="276" text-anchor="middle" font-size="17" fill="#344054">理解上下文</text>
    <text x="600" y="307" text-anchor="middle" font-size="17" fill="#344054">生成回复</text>

    <path d="M733 235 H825" stroke="#f59e0b" stroke-width="5" fill="none" marker-end="url(#arrowOrange)"/>
    <text x="780" y="212" text-anchor="middle" font-size="16" fill="#92400e">继续消耗</text>

    <rect x="840" y="170" width="280" height="130" rx="24" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="980" y="220" text-anchor="middle" font-size="24" font-weight="700" fill="#344054">AI 的输出</text>
    <text x="980" y="255" text-anchor="middle" font-size="17" fill="#667085">回答、总结、文章初稿</text>

    <rect x="135" y="405" width="930" height="160" rx="28" fill="#ffffff" stroke="#e4e7ec" stroke-width="2"/>
    <text x="600" y="455" text-anchor="middle" font-size="24" font-weight="700" fill="#101828">为什么小白要知道 Token？</text>
    <text x="235" y="510" text-anchor="middle" font-size="20" fill="#344054">1. 影响费用</text>
    <text x="600" y="510" text-anchor="middle" font-size="20" fill="#344054">2. 影响 AI 能记住多少内容</text>
    <text x="955" y="510" text-anchor="middle" font-size="20" fill="#344054">3. 影响你怎么提问</text>
  </g>

  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
