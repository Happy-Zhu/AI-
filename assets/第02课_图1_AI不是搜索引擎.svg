<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#f7f8fa"/>
  <text x="600" y="64" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2a37">AI 和搜索引擎的区别</text>
  <text x="600" y="104" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">搜索引擎更像“找资料”，AI 更像“生成回答”</text>

  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="105" y="170" width="430" height="330" rx="28" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="320" y="225" text-anchor="middle" font-size="28" font-weight="700" fill="#175cd3">搜索引擎</text>
    <text x="320" y="272" text-anchor="middle" font-size="20" fill="#344054">输入关键词</text>
    <path d="M320 292 V342" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="320" y="382" text-anchor="middle" font-size="20" fill="#344054">返回网页和链接</text>
    <path d="M320 402 V452" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="320" y="490" text-anchor="middle" font-size="19" fill="#667085">你自己阅读、筛选、判断</text>

    <rect x="665" y="170" width="430" height="330" rx="28" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="880" y="225" text-anchor="middle" font-size="28" font-weight="700" fill="#047857">AI</text>
    <text x="880" y="272" text-anchor="middle" font-size="20" fill="#344054">输入问题和背景</text>
    <path d="M880 292 V342" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="880" y="382" text-anchor="middle" font-size="20" fill="#344054">理解上下文并生成回答</text>
    <path d="M880 402 V452" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="880" y="490" text-anchor="middle" font-size="19" fill="#667085">你负责核验、修改、使用</text>

    <rect x="220" y="545" width="760" height="72" rx="20" fill="#ecfdf3" stroke="#10b981" stroke-width="2"/>
    <text x="600" y="590" text-anchor="middle" font-size="24" font-weight="700" fill="#047857">AI 说得像答案，不代表它一定等于事实</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#98a2b3"/>
    </marker>
  </defs>
</svg>
