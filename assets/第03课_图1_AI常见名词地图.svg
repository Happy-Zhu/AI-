<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#f7f8fa"/>
  <text x="600" y="64" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2a37">AI 常见名词地图</text>
  <text x="600" y="104" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">小白先理解这 5 个词，就能看懂大部分 AI 入门内容</text>

  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="460" y="250" width="280" height="120" rx="28" fill="#ecfdf3" stroke="#10b981" stroke-width="3"/>
    <text x="600" y="302" text-anchor="middle" font-size="30" font-weight="700" fill="#047857">AI 对话</text>
    <text x="600" y="340" text-anchor="middle" font-size="18" fill="#344054">你输入，模型生成回答</text>

    <rect x="110" y="170" width="220" height="92" rx="22" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="220" y="206" text-anchor="middle" font-size="24" font-weight="700" fill="#175cd3">模型</text>
    <text x="220" y="237" text-anchor="middle" font-size="16" fill="#667085">负责生成答案的“大脑”</text>

    <rect x="110" y="420" width="220" height="92" rx="22" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="220" y="456" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">Token</text>
    <text x="220" y="487" text-anchor="middle" font-size="16" fill="#667085">AI 读写文字的小颗粒</text>

    <rect x="490" y="500" width="220" height="92" rx="22" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="600" y="536" text-anchor="middle" font-size="24" font-weight="700" fill="#047857">上下文</text>
    <text x="600" y="567" text-anchor="middle" font-size="16" fill="#667085">AI 当前能看到的信息</text>

    <rect x="870" y="170" width="220" height="92" rx="22" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="980" y="206" text-anchor="middle" font-size="24" font-weight="700" fill="#175cd3">Prompt</text>
    <text x="980" y="237" text-anchor="middle" font-size="16" fill="#667085">你给 AI 的任务说明</text>

    <rect x="870" y="420" width="220" height="92" rx="22" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="980" y="456" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">API</text>
    <text x="980" y="487" text-anchor="middle" font-size="16" fill="#667085">让软件调用 AI 的接口</text>

    <path d="M338 215 C390 228, 420 260, 455 292" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M338 465 C395 455, 430 400, 466 360" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M600 492 V378" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M862 215 C810 228, 780 260, 745 292" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M862 465 C805 455, 770 400, 734 360" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#98a2b3"/>
    </marker>
  </defs>
</svg>
