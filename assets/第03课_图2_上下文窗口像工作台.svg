<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#fbfbfd"/>
  <text x="600" y="64" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2a37">上下文窗口像一张有限的工作台</text>
  <text x="600" y="104" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">AI 当前能处理的信息越清楚，回答越不容易跑偏</text>

  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="150" y="160" width="900" height="330" rx="34" fill="#ffffff" stroke="#d0d5dd" stroke-width="3"/>
    <text x="600" y="215" text-anchor="middle" font-size="28" font-weight="700" fill="#047857">上下文窗口</text>
    <text x="600" y="250" text-anchor="middle" font-size="18" fill="#667085">AI 当前能看见并参考的信息范围</text>

    <rect x="230" y="310" width="180" height="80" rx="18" fill="#ecfdf3" stroke="#10b981" stroke-width="2"/>
    <text x="320" y="343" text-anchor="middle" font-size="20" font-weight="700" fill="#047857">你的问题</text>
    <text x="320" y="370" text-anchor="middle" font-size="15" fill="#667085">目标是什么</text>

    <rect x="510" y="310" width="180" height="80" rx="18" fill="#eff6ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="600" y="343" text-anchor="middle" font-size="20" font-weight="700" fill="#175cd3">背景资料</text>
    <text x="600" y="370" text-anchor="middle" font-size="15" fill="#667085">约束和信息</text>

    <rect x="790" y="310" width="180" height="80" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="880" y="343" text-anchor="middle" font-size="20" font-weight="700" fill="#92400e">历史对话</text>
    <text x="880" y="370" text-anchor="middle" font-size="15" fill="#667085">前面说过什么</text>

    <path d="M600 494 V560" stroke="#98a2b3" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
    <rect x="325" y="560" width="550" height="76" rx="22" fill="#ecfdf3" stroke="#10b981" stroke-width="2"/>
    <text x="600" y="608" text-anchor="middle" font-size="24" font-weight="700" fill="#047857">信息清楚，AI 才更容易给出靠谱回答</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#98a2b3"/>
    </marker>
  </defs>
</svg>
