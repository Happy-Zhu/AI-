<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#f7f8fa"/>
  <text x="600" y="64" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2a37">AI 参与后的信息处理流程</text>
  <text x="600" y="104" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">AI 不是替你判断，而是帮你更快完成理解、整理和表达</text>

  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="70" y="165" width="170" height="92" rx="18" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="155" y="205" text-anchor="middle" font-size="22" font-weight="700" fill="#344054">资料输入</text>
    <text x="155" y="235" text-anchor="middle" font-size="15" fill="#667085">文章 / 会议 / 想法</text>

    <path d="M250 211 H327" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <rect x="340" y="145" width="220" height="132" rx="22" fill="#e8f3ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="450" y="190" text-anchor="middle" font-size="24" font-weight="700" fill="#175cd3">AI 辅助处理</text>
    <text x="450" y="222" text-anchor="middle" font-size="16" fill="#344054">解释、总结、提纲</text>
    <text x="450" y="250" text-anchor="middle" font-size="16" fill="#344054">改写、发散、拆解</text>

    <path d="M570 211 H647" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <rect x="660" y="165" width="170" height="92" rx="18" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="745" y="205" text-anchor="middle" font-size="22" font-weight="700" fill="#344054">人来判断</text>
    <text x="745" y="235" text-anchor="middle" font-size="15" fill="#667085">筛选 / 修改 / 核验</text>

    <path d="M840 211 H917" stroke="#98a2b3" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <rect x="930" y="165" width="200" height="92" rx="18" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="1030" y="205" text-anchor="middle" font-size="22" font-weight="700" fill="#344054">形成结果</text>
    <text x="1030" y="235" text-anchor="middle" font-size="15" fill="#667085">文章 / 方案 / 行动</text>

    <rect x="150" y="365" width="900" height="150" rx="26" fill="#ffffff" stroke="#e4e7ec" stroke-width="2"/>
    <text x="600" y="410" text-anchor="middle" font-size="24" font-weight="700" fill="#101828">这节课最重要的一句话</text>
    <text x="600" y="455" text-anchor="middle" font-size="30" font-weight="700" fill="#047857">AI 不是永远正确的答案机器</text>
    <text x="600" y="495" text-anchor="middle" font-size="25" fill="#344054">它更像一个帮你更快进入思考的起点生成器</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#98a2b3"/>
    </marker>
  </defs>
</svg>
