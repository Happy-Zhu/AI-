<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680">
  <rect width="1200" height="680" fill="#fbfbfd"/>
  <text x="600" y="64" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2a37">AI 如何生成一句话？</text>
  <text x="600" y="104" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="18" fill="#667085">它不是从仓库里复制答案，而是在不断预测“下一个更可能出现的词”</text>

  <g font-family="Microsoft YaHei, Arial, sans-serif">
    <rect x="120" y="170" width="960" height="92" rx="24" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="180" y="228" font-size="26" fill="#344054">输入：</text>
    <text x="270" y="228" font-size="30" font-weight="700" fill="#101828">今天的天气真</text>

    <text x="600" y="330" text-anchor="middle" font-size="23" font-weight="700" fill="#047857">模型会评估下一个词的可能性</text>

    <rect x="210" y="380" width="180" height="88" rx="18" fill="#ecfdf3" stroke="#10b981" stroke-width="2"/>
    <text x="300" y="417" text-anchor="middle" font-size="26" font-weight="700" fill="#047857">不错</text>
    <text x="300" y="448" text-anchor="middle" font-size="18" fill="#667085">42%</text>

    <rect x="430" y="380" width="180" height="88" rx="18" fill="#eff6ff" stroke="#2f80ed" stroke-width="2"/>
    <text x="520" y="417" text-anchor="middle" font-size="26" font-weight="700" fill="#175cd3">热</text>
    <text x="520" y="448" text-anchor="middle" font-size="18" fill="#667085">26%</text>

    <rect x="650" y="380" width="180" height="88" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="740" y="417" text-anchor="middle" font-size="26" font-weight="700" fill="#92400e">好</text>
    <text x="740" y="448" text-anchor="middle" font-size="18" fill="#667085">19%</text>

    <rect x="870" y="380" width="180" height="88" rx="18" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="960" y="417" text-anchor="middle" font-size="26" font-weight="700" fill="#344054">奇怪</text>
    <text x="960" y="448" text-anchor="middle" font-size="18" fill="#667085">3%</text>

    <path d="M300 480 C340 560, 500 565, 590 545" stroke="#10b981" stroke-width="5" fill="none" marker-end="url(#arrowGreen)"/>
    <rect x="420" y="545" width="360" height="76" rx="20" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
    <text x="600" y="593" text-anchor="middle" font-size="26" font-weight="700" fill="#047857">今天的天气真不错</text>
  </g>

  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981"/>
    </marker>
  </defs>
</svg>
